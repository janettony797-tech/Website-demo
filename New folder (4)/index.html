<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>  WILL YOU BE MY VALENTINE?</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f9e3e3;
      font-family: 'Arial', sans-serif;
      flex-direction: column;
    }
    .container { text-align: center; }
    h1 { font-size: 2.5em; color: #d32f2f; }
    .buttons { margin-top: 20px; }
    .yes-button, .no-button {
      font-size: 1.5em;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      color: white;
    }
    .yes-button { background-color: #4caf50; margin-right: 10px; }
    .no-button { background-color: #f44336; }
    .gif_container img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container" id="main">
    <h1>Tinashe My Love 
      Will you be my Valentine?</h1>
    <div class="buttons">
      <button class="yes-button" onclick="handleYesClick()">Yes</button>
      <button class="no-button" onclick="handleNoClick()">No</button>
    </div>
    <div class="gif_container">
      <img src="https://media.tenor.com/Y-1mhjlV-j4AAAAM/milk-and-mocha-hugs.gif" alt="Cute GIF">
    </div>
  </div>

  <script>
    const messages = [
      "Are you sure?",
      "Really sure??",
      "Are you positive?",
      "Pookie please...",
      "Just think about it!",
      "If you say no, I will be really sad...",
      "I will be very sad...",
      "I will be very very very sad...",
      "Ok fine, I will stop asking...",
      "Just kidding, say yes please! ❤️"
    ];
    let messageIndex = 0;

    function handleNoClick() {
      const noButton = document.querySelector('.no-button');
      const yesButton = document.querySelector('.yes-button');
      noButton.textContent = messages[messageIndex];
      messageIndex = (messageIndex + 1) % messages.length;
      const currentSize = parseFloat(window.getComputedStyle(yesButton).fontSize);
      yesButton.style.fontSize = `${currentSize * 1.5}px`;
    }

    function handleYesClick() {
      document.getElementById("main").innerHTML = `
        <h1>Knew you would say yes!</h1>
        <div class="gif_container">
          <img src="https://media.tenor.com/Lo6j2hho85EAAAAM/cat-hug-mochi.gif" alt="Cat Hug">
        </div>
      `;
    }
  </script>
</body>
</html>
